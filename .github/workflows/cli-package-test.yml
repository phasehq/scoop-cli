name: Scoop Manifest Validation

on:
  push:
    paths:
      - "phase.json"
  pull_request:

jobs:
  manifest-validation:
    name: Validate Scoop Manifest
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Scoop Package Manager
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm get.scoop.sh | iex
        shell: pwsh

      - name: Add Scoop to PATH
        run: echo "${env:USERPROFILE}\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Install and verify phase-cli
        run: |
          scoop install ${{ github.workspace }}\phase.json
          $content = Get-Content ${{ github.workspace }}\phase.json | ConvertFrom-Json
          $expected = $content.version
          $actual = phase --version
          if ($actual -ne $expected) {
            throw "Version mismatch: Expected $expected, but found $actual"
          }
        shell: pwsh

  scoop-upgrade-test:
    name: Upgrade test (Windows)
    runs-on: windows-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Scoop Package Manager
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm get.scoop.sh | iex
        shell: pwsh

      - name: Add Scoop to PATH
        run: echo "${env:USERPROFILE}\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Install old version from published bucket
        run: |
          scoop bucket add phase-cli https://github.com/phasehq/scoop-cli.git
          scoop install phase-cli/phase
          $version = phase --version
          Write-Host "Installed version: $version"
        shell: pwsh

      - name: Verify old version is 1.x
        run: |
          $version = phase --version
          if ($version -notmatch '^1\.') {
            throw "Expected 1.x version, got: $version"
          }
          Write-Host "Old version confirmed: $version"
        shell: pwsh

      - name: Upgrade to new version from PR
        run: |
          # Replace the manifest in the bucket and prevent git pull from overwriting it
          $bucketPath = "$env:USERPROFILE\scoop\buckets\phase-cli"
          Copy-Item "${{ github.workspace }}\phase.json" "$bucketPath\phase.json" -Force

          Push-Location $bucketPath
          git remote remove origin
          git add phase.json
          git commit -m "Update to new version"
          Pop-Location

          scoop update phase
        shell: pwsh

      - name: Verify upgrade succeeded
        run: |
          $content = Get-Content ${{ github.workspace }}\phase.json | ConvertFrom-Json
          $expected = $content.version
          $actual = phase --version
          Write-Host "Expected: $expected"
          Write-Host "Actual: $actual"
          if ($actual -ne $expected) {
            throw "Version mismatch after upgrade: expected $expected, got $actual"
          }
        shell: pwsh

      - name: Verify old artifacts removed
        run: |
          $appDir = "$env:USERPROFILE\scoop\apps\phase\current"
          if (Test-Path "$appDir\Windows-binary") {
            throw "ERROR: Old Windows-binary directory still exists after upgrade"
          }
          Write-Host "Old artifacts properly cleaned up"
        shell: pwsh
